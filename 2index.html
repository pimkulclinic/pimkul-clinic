<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>พิมพ์กุล คลินิก</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pk:#e8829a;--pkl:#fdf0f3;--pkm:#f5c6d2;--pkd:#c25e78;--gn:#2d7a47;--gnl:#e8f7ec;--gnm:#9ed9b0;--bg:#fafafa;--sf:#fff;--tx:#2a2a2a;--txm:#888;--txl:#bbb;--bd:rgba(0,0,0,.08);--r:14px;--rs:8px}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;-webkit-tap-highlight-color:transparent}
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:16px 16px 0;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--pk),var(--pkd));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:20px;height:20px;fill:#fff}
.ht{font-size:17px;font-weight:600}.hs{font-size:12px;color:var(--txm)}
.sw{position:relative;margin-bottom:10px}
.sw svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--txm);fill:none;pointer-events:none}
#q{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--bd);border-radius:10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--tx);outline:none}
#q:focus{border-color:var(--pk)}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 14px;border-radius:20px;font-size:13px;font-family:inherit;white-space:nowrap;border:1px solid var(--bd);background:transparent;color:var(--txm);cursor:pointer}
.tab.on{background:var(--pk);color:#fff;border-color:var(--pk)}
.main{padding:12px 14px 80px}
.slbl{font-size:12px;font-weight:600;color:var(--pk);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:8px}
.ch{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.ctag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;background:var(--pkl);color:var(--pkd)}
.clbl{font-size:14px;font-weight:600;flex:1}
.ctxt{font-size:14px;line-height:1.65;color:#444;margin-bottom:10px;white-space:pre-line}
.ctxt.cl{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ca{display:flex;gap:8px;align-items:center}
.bex{font-size:12px;color:var(--txm);background:none;border:none;padding:0;cursor:pointer;font-family:inherit;flex:1;text-align:left}
.bcp{font-size:13px;font-family:inherit;padding:7px 16px;border-radius:8px;background:var(--pk);color:#fff;border:none;cursor:pointer;font-weight:500;flex-shrink:0}
.bcp:active{transform:scale(.96)}.bgn{background:var(--gn)}
.dopt{display:flex;align-items:flex-start;gap:10px;padding:10px;border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:8px;cursor:pointer}
.dopt.on{border-color:var(--pk);background:var(--pkl)}
.dlbl{font-size:13px;line-height:1.5}.dlbl b{display:block;font-weight:600}
.drow{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.drow input{flex:1;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--bg);color:var(--tx);outline:none}
.drow input:focus{border-color:var(--pk)}.drow .pi{width:90px;flex:none}
.drow input::placeholder{color:var(--txl)}
.brm{background:none;border:none;color:var(--txl);cursor:pointer;font-size:18px;line-height:1;padding:0 4px}
.badd{display:flex;align-items:center;gap:6px;font-size:13px;font-family:inherit;color:var(--pk);background:none;border:1px dashed var(--pkm);border-radius:var(--rs);padding:7px 12px;cursor:pointer;width:100%;margin-bottom:12px}
.sprev{background:var(--bg);border-radius:var(--rs);padding:12px;font-size:13px;line-height:1.7;color:var(--tx);white-space:pre-line;border:1px solid var(--bd);margin-bottom:10px;min-height:60px}
.scard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:8px}
.srow{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;margin-top:2px}
.bf{background:#fde8f0;color:#c25e78}.bm{background:#e8f0fe;color:#3d6ac5}
.snote{font-size:13px;color:#555;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}
.pill{display:inline-block;padding:2px 8px;border-radius:5px;font-size:12px;font-weight:500;margin:2px 3px 2px 0}
.pf{background:#fde8f0;color:#c25e78}.pm{background:#e8f0fe;color:#3d6ac5}
.tdhi{background:linear-gradient(135deg,var(--pkl),#fff);border:1px solid var(--pkm);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.tdl{font-size:11px;font-weight:600;color:var(--pk);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.tdd{font-size:15px;font-weight:600}
.gpromo{background:var(--gnl);border:1px solid var(--gnm);border-radius:var(--rs);padding:8px 12px;font-size:13px;color:var(--gn);font-weight:500;margin:8px 0 4px;text-align:center}
.pki{display:flex;gap:8px;margin-bottom:8px;font-size:13px;line-height:1.6}
.pki span:first-child{flex-shrink:0;font-size:16px;margin-top:1px}
.empty{text-align:center;padding:3rem 1rem;color:var(--txm);font-size:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#2a2a2a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}</style>
</head>
<body>
<div class="hdr">
<div class="hdr-top">
<div class="logo"><svg viewBox="0 0 24 24"><path d="M12 21.7C5.4 21.7 2 16.8 2 12 2 7.2 5.4 2.3 12 2.3s10 4.9 10 9.7-3.4 9.7-10 9.7zm-1-13v3H8l4 4 4-4h-3V8.7h-2z"/></svg></div>
<div><div class="ht">พิมพ์กุล คลินิก</div><div class="hs">คู่มือตอบคนไข้ สำหรับแอดมิน</div></div>
</div>
<div class="sw"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="q" placeholder="ค้นหา เช่น สิว นัด ราคา ยา..." oninput="render()"></div>
<div class="tabs" id="tabs"></div>
</div>
<div class="main" id="main"></div>
<div class="toast" id="toast"></div>
<textarea id="ta" style="position:fixed;left:-9999px;top:0;opacity:0"></textarea>
<script type="application/json" id="d-tx">{"0": "คุณหมอผู้หญิงเข้าวันพุธ พฤหัสบดี เสาร์ คุณหมอผู้ชายเข้าวันจันทร์ อังคาร อาทิตย์ค่ะ สามารถเข้ามาวันที่สะดวกได้เลยค่ะ แอดมินฝากเคสกับคุณหมอให้ค่ะ 😊", "1": "สะดวกจัดส่งทางไปรษณีย์มีค่าบริการ 70 บาท ส่งภายใน 24 ชม. หรือสะดวกเรียก Grab/Lineman ค่าส่งตามจริง ส่งภายในเวลาทำการค่ะ", "2": "ที่จอดรถพิมพ์กุลคลินิก:\n• จอดได้ด้านข้างคลินิก\n• ด้านหลังบริเวณตึกเพรชชมพูแมนชั่น สามารถเอากรวยออกได้เลยค่ะ\n• หากเต็มขับเลยไป 1 ซอยจะเจอลานจอดของ 7-Eleven ค่ะ\nคลิปที่จอดรถ: https://www.facebook.com/share/r/1DDfDvmPqJ/?mibextid=wwXIfr", "3": "พิมพ์กุลคลินิก ตรงข้ามตลาดมีนบุรี ติด MRT ตลาดมีนบุรี ทางออก 3 หรือ 4 ค่ะ โทร 099-029-5639\nGoogle Maps: https://maps.app.goo.gl/bzFThvJoSQFMmx9dA", "4": "สามารถนัดหมายกับแอดมินหรือเข้ามาเป็นคิว walk in ได้ค่ะ\nหากต้องการนัดหมายแอดมินรบกวนขอทราบ\n• ชื่อ-นามสกุล\n• เบอร์โทรติดต่อ\n• วันและเวลาที่สะดวกค่ะ\nแอดมินตรวจสอบคิวแล้วจะรีบแจ้งกลับค่ะ\n\nวันธรรมดาคุณหมอจะเข้า 16.00-21.00 น.\nเสาร์-อาทิตย์ 10.00-19.00 น.ค่ะ", "5": "สวัสดีค่ะคุณ [ชื่อ] พอดีคุณ [ชื่อ] มีนัดที่พิมพ์กุลคลินิก วันที่ [วันที่] เวลา [เวลา] น. ไม่ทราบว่าสะดวกมาตามนัดไหมคะ", "6": "สวัสดีค่ะ คุณ [ชื่อ] เดิมคุณ [ชื่อ] มีนัดที่พิมพ์กุลคลินิกเมื่อวันที่ [วันที่] คุณ [ชื่อ] สะดวกทำนัดใหม่ไหมคะ", "7": "สวัสดีค่ะ วันนี้คุณ [ชื่อ] สะดวกเข้ามาพบหมอตามนัดไหมคะ หากวันนี้ติดธุระหรือไม่สะดวกเข้ามา สามารถแจ้งเพื่อเปลี่ยนนัดได้เลยค่ะ", "8": "สวัสดีค่ะคุณ [ชื่อ] มีนัดวันที่ [วันที่] [เวลา] น. กับคุณหมอกุลทอง พอดีคุณหมอติดธุระที่โรงพยาบาลจะเข้าคลินิกประมาณ 17.30 น.ค่ะ ช่วงเวลา 16.00-17.30 จะเป็นคุณหมอพิมตรวจแทนก่อน คุณ [ชื่อ] สะดวกตรวจกับคุณหมอพิมตามเวลาเดิมหรือเลื่อนเป็นช่วงเวลาคุณหมอกุลทองดีคะ 😊", "9": "สวัสดีค่ะ ค่ารักษาโดยทั่วไปจะอยู่ที่ประมาณ 500-2,000 บาทค่ะ ขึ้นอยู่กับคุณหมอจ่ายยาค่ะ ถ้ามีหัตถการหรือเจาะเลือดคุณหมอจะแจ้งค่าใช้จ่ายก่อนค่ะ ยังไงเข้ามาให้คุณหมอตรวจประเมินอาการก่อนได้ค่ะ", "10": "ตรวจรักษาโรคผิวหนังปกติค่าแพทย์ 500 บาทค่ะ แล้วแต่บางเคสคุณหมอก็ไม่ได้คิดค่าบริการค่ะ", "11": "ค่าทำแผลทั่วไปอยู่ที่ 350 บาทค่ะ", "12": "ตัดชิ้นเนื้อเพื่อส่งตรวจโรคเริ่มต้นที่ 2,000-6,500 บาทขึ้นกับชนิดของตัวโรคค่ะ เจาะเลือดจะคิดตามชนิดแลปที่คุณหมอสั่งเริ่มต้นที่ 500 บาทค่ะ", "13": "ยากดภูมิของคลินิกหลายชนิดเลยค่ะ ตั้งแต่หลักพัน-หมื่น ยังไงเข้ามาปรึกษาคุณหมอก่อนได้ค่ะ", "14": "สวัสดีค่ะ บริการรักษาสิวมีกดสิว 350 ฉีดสิว 300 ทั่วหน้าค่ะ ค่ายาตลับละประมาณ 100 บาทค่ะ ยากินจะขึ้นกับคุณหมอเป็นคนประเมินค่ะ รวมประมาณครั้งละ 500-2,000 บาทค่ะ", "15": "สวัสดีค่ะ\nกดสิวทั่วหน้า 350 บาทค่ะ\nฉีดสิวทั่วหน้า 300 บาทค่ะ\nกดสิว + ฉีดสิว 650 บาทค่ะ", "16": "สวัสดีค่ะ ที่คลินิกมีกดสิว ฉีดสิว mask และฉายแสงฆ่าเชื้อสิวทั้งหมดอยู่ที่ 999 บาทค่ะ\n• กดสิวโดยผู้ช่วยแพทย์\n• ฉีดสิวอักเสบโดยแพทย์\n• มาส์กสูตรลดสิวและปลอบประโลมผิว\n• ฉายแสงฆ่าเชื้อสิว ลดการเกิดสิวเพิ่ม\nสามารถเข้ามาปรึกษาคุณหมอก่อนได้นะคะ", "17": "สิวที่หลังที่คลินิกจะมีหัตถการเป็นฉีดสิวอักเสบ ทำเลเซอร์ และทากรดผลไม้เพื่อลบรอยสิวร่วมกับยาทาค่ะ", "18": "ทางคลินิกมีเลเซอร์รอยดำและรอยแดงจากสิว 3 แบบค่ะ\n• IPL Laser 1,500 บาท\n• Pico Acne 1,990 บาท\n• Long Pulsed Laser 2,590 บาท\nยังไงเข้ามาให้คุณหมอช่วยเลือกเครื่องที่เหมาะกับผิวก่อนได้เลยค่ะ", "19": "รักษาหลุมสิวที่คลินิกจะมีการรักษาด้วยแต้มกรดผลไม้ ราคาแต้มกรดอยู่ที่ 890 บาทค่ะ และเลเซอร์ด้วยเครื่อง Fractional CO2, Pico Scar, Venus Viva ราคาเริ่มต้นที่ 1,500-5,000 บาท/ครั้ง ขึ้นอยู่กับคุณหมอเลือกเครื่องที่เหมาะกับชนิดของหลุมสิวค่ะ\nเห็นผลตั้งแต่ครั้งแรกค่ะ จะชัดขึ้นในครั้งที่ 3-4 ค่ะ", "20": "รอยสิวจะมีเป็นโปรแกรมเลเซอร์ค่ะ ครั้งละประมาณ 1,500-2,000 บาทค่ะ ยังไงเข้ามาให้คุณหมอช่วยดูก่อนได้เลยค่ะ", "21": "สวัสดีค่ะรักษาหูดที่คลินิกมีทั้งยาทา ยาฉีด พ่นเย็นค่ะ และผ่าตัด ค่ารักษาครั้งละ 500-2,000 บาทขึ้นกับคุณหมอประเมินอาการค่ะ", "22": "ที่คลินิกมีการรักษาผมร่วง ผมบางด้วยยาทาน ยาทา และการฉีดยาค่ะ ราคารักษาอยู่ที่ 500-2,000 บาทค่ะ หากมีการเจาะเลือดเพื่อตรวจหาสาเหตุคุณหมอจะแจ้งให้ทราบก่อนทุกครั้งค่ะ", "23": "มียาทา ยาทาน หัตถการมีการฉีดสลายฝ้า 800 บาท เลเซอร์ลดเม็ดสี 1,500-3,000 บาท และลอกกรดผลไม้ค่ะ ยังไงเข้ามาให้คุณหมอประเมินอาการฝ้าดูก่อนได้ค่ะ ราคารักษาฝ้าเริ่มต้นที่ 500-2,000 บาทค่ะ", "24": "สวัสดีค่ะ มีการรักษาด้วยยาทา ยากิน ฉายแสง แล้วก็ยาฉีดค่ะ ยังไงคนไข้เข้ามาให้คุณหมอประเมินอาการก่อนได้ค่ะ ค่ารักษาจะอยู่ที่ประมาณ 500-2,000 บาทค่ะ", "25": "รักษาด่างขาวทางคลินิกจะมีการรักษาโดยยาทา ยาทาน และฉายแสงค่ะ ค่ารักษาโดยทั่วไปจะอยู่ที่ประมาณ 500-2,000 บาทค่ะ", "26": "มีบริการฉีดแผลเป็นนูนและเลเซอร์ค่ะ ฉีดครั้งละประมาณ 500-1,500 บาทค่ะ โดยปกติคุณหมอแนะนำให้ฉีดเดือนละครั้งค่ะ เห็นแผลตั้งแต่ครั้งแรกที่ฉีด แผลเป็นจะนิ่มลงและอาการคันลดลงค่ะ\nเลเซอร์เริ่มต้นที่ 1,500-3,000 ขึ้นอยู่กับคุณหมอเลือกเครื่องค่ะ", "27a": "CO2 Laser จี้ไฝ กระ ติ่งเนื้อ กระเนื้อ ขี้แมลงวัน ต่อมไขมัน หูดค่ะ\nราคาเริ่มต้นจุดละ 500-1,000 บาท ไม่มีราคาเหมา โดยทั่วไปหากปริมาณมากทั่วหน้า/ทั่วคออยู่ที่ 2,000-6,000 บาทค่ะ\nแปะยาชาประมาณ 1 ชั่วโมง ทำประมาณ 20-30 นาที แนะนำให้มาเผื่อเวลาประมาณ 2 ชม.ค่ะ", "27b": "การดูแลหลังทำ CO2 Laser:\n• งดโดนน้ำบริเวณที่เลเซอร์ 24 ชั่วโมงค่ะ\n• สะเก็ดจะหลุดประมาณ 1-2 สัปดาห์ค่ะ\n• หลังครบ 24 ชม. ทาครีมบำรุงและครีมกันแดดได้ปกติค่ะ\n• งดครีมสารผลัดเซลล์ผิวและสครับหน้าประมาณ 2 สัปดาห์ค่ะ\n• สามารถทำซ้ำทุก 4 สัปดาห์ค่ะ", "28a": "Fractional CO2 รักษารอยแผลเป็น หลุมสิว ผิวไม่สม่ำเสมอค่ะ เป็นเครื่องจากเกาหลีค่ะ\nราคาเริ่มต้นที่ 1,500-4,000 บาทค่ะ\nแปะยาชาประมาณ 1 ชั่วโมง ทำประมาณ 20-30 นาทีค่ะ", "28b": "การดูแลหลังทำ Fractional CO2:\n• งดโดนน้ำบริเวณที่เลเซอร์ 24 ชั่วโมงค่ะ\n• สะเก็ดจะหลุดประมาณ 1-2 สัปดาห์ค่ะ\n• หลังครบ 24 ชม. ทาครีมบำรุงและครีมกันแดดได้ปกติค่ะ\n• งดครีมสารผลัดเซลล์ผิวและสครับหน้าประมาณ 2 สัปดาห์ค่ะ\n• สามารถทำซ้ำทุก 4 สัปดาห์ค่ะ", "29a": "Excimer Laser แสงอาทิตย์เทียม สำหรับรักษาด่างขาวค่ะ\nราคาเริ่มต้นที่ครั้งละประมาณ 400 บาทค่ะ\nแนะนำให้ทำ 2-3 ครั้ง/สัปดาห์ต่อเนื่องนาน 2-6 เดือนค่ะ", "29b": "การดูแลหลังทำ Excimer Laser:\n• หลังทำสีผิวบริเวณที่เลเซอร์อาจมีสีแดงอมชมพูขึ้นหรือคล้ำขึ้นได้ในช่วงที่ทำการรักษาค่ะ\n• ห้ามแกะเกาและขีดข่วนบริเวณที่ฉายแสงค่ะ\n• ใช้สบู่เหลวแบบอ่อนโยนเท่านั้น งดสบู่ที่มีสารผลัดเซลล์ผิวค่ะ\n• เลี่ยงการโดนแดดจัดในบริเวณที่ทำ ทาครีมกันแดดอย่างสม่ำเสมอค่ะ\n• ทาครีมบำรุงมอยส์เจอร์ไรเซอร์เช้า-เย็น เพื่อลดอาการคันและแห้งค่ะ\n• ไปตามนัดตามตารางการฉายแสงอย่างสม่ำเสมอค่ะ", "30": "IPL Laser ช่วยรักษารอยแดง รอยดำ และสิวอักเสบค่ะ ราคา 1,500 บาทต่อครั้งค่ะ\nมีโปรโมชั่น 5 ครั้งแถม 2 ครั้ง 7,500 บาทค่ะ\nหลังทำไม่ต้องพักฟื้น สามารถทำซ้ำทุก 2 สัปดาห์ค่ะ", "31a": "Pico Acne รักษารอยสิว คุณหมอจะยิง 2 โหมดคือโหมดรอยแดง และโหมดรอยดำสิว ราคา 1,990 บาทค่ะ\nเป็น PICO Majesty ผ่านมาตรฐาน USFDA ค่ะ", "31b": "การดูแลหลังทำ Pico Acne:\n• อาจมีอาการแดงเล็กน้อยประมาณ 1-2 ชั่วโมงค่ะ จากนั้นกลับมาปกติค่ะ\n• ไม่ทิ้งรอยหรือแผลค่ะ\n• ทาครีมและยาได้ตามปกติค่ะ\n• หลีกเลี่ยงเจอแดดจัดประมาณ 2 สัปดาห์ค่ะ\n• สามารถทำซ้ำทุก 2 สัปดาห์ค่ะ", "32a": "Pico Scar รักษารูขุมขนกว้างและหลุมสิว ราคา 2,990 บาทค่ะ\nแปะยาชาก่อนทำ 45 นาทีถึง 1 ชั่วโมงค่ะ", "32b": "การดูแลหลังทำ Pico Scar:\n• จะมีอาการแดงตกสะเก็ด 1-2 สัปดาห์ โดยอาการจะลดลงเรื่อยๆค่ะ\n• งดล้างหน้า 24 ชั่วโมงค่ะ งดยาทาสิว 1 สัปดาห์ค่ะ\n• หลีกเลี่ยงเจอแดดจัดประมาณ 2 สัปดาห์ค่ะ\n• ใน 24 ชม.แรก ถ้ารู้สึกหน้าหนอะหน้ามาก สามารถล้างหน้าด้วยน้ำสะอาดอย่างเดียว งดสบู่ รีบซับให้แห้ง แล้วทายาหรือครีมบำรุงทันทีค่ะ\n• สามารถทำซ้ำทุก 4 สัปดาห์ค่ะ", "33a": "Pico Complete คุณหมอจะใช้ทุกโหมดในการเลเซอร์ในครั้งเดียว ช่วยรักษารอยดำรอยแดง และกระชับรูขุมขนค่ะ\nราคา 4,990 บาทต่อครั้งค่ะ\nแปะยาชาก่อนทำ 45 นาทีถึง 1 ชั่วโมงค่ะ", "33b": "การดูแลหลังทำ Pico Complete:\n• จะมีอาการแดงตกสะเก็ดถึง 2 สัปดาห์ โดยอาการจะลดลงเรื่อยๆค่ะ\n• งดล้างหน้า 24 ชั่วโมงค่ะ งดยาทาสิว 1 สัปดาห์ค่ะ\n• หลีกเลี่ยงเจอแดดจัดประมาณ 2 สัปดาห์ค่ะ\n• ถ้ารู้สึกหน้าหนอะหน้ามาก ล้างหน้าด้วยน้ำสะอาดอย่างเดียว งดสบู่ รีบซับให้แห้ง แล้วทายาหรือครีมบำรุงทันทีค่ะ", "34a": "PICO bright เน้นรอยดำ หน้ากระจ่างใสฝ้า ครั้งละ 2,590 บาทค่ะ", "34b": "การดูแลหลังทำ Pico Bright:\n• อาจมีอาการแดงเล็กน้อย 1-2 ชั่วโมงค่ะ ทาครีมและยาได้ตามปกติค่ะ\n• หลีกเลี่ยงเจอแดดจัดประมาณ 2 สัปดาห์ค่ะ\n• สามารถทำซ้ำทุก 4 สัปดาห์ค่ะ", "35a": "Pico Freckles เลเซอร์กระด้วยเครื่อง Pico ราคา 2,000-4,000 บาทค่ะ ขึ้นกับปริมาณและชนิดของกระค่ะ\nแปะยาชาประมาณ 1 ชั่วโมง ทำประมาณ 20-30 นาทีค่ะ", "35b": "การดูแลหลังทำ Pico Freckles:\n• งดโดนน้ำบริเวณที่เลเซอร์ 24 ชั่วโมงค่ะ\n• สะเก็ดจะหลุดประมาณ 1-2 สัปดาห์ค่ะ\n• ถ้ารู้สึกหน้าหนอ nit 4,990 บาท / 100 unit 7,990 บาท แถมฉายแสงกระตุ้น collagen + premium mask ค่ะ\nXeomin เยอรมัน: 50 units 7,990 บาทค่ะ\nAllergan อเมริกา: 50 units 8,990 บาทค่ะ", "41b": "การดูแลหลังฉีด Botox:\n• ห้ามนอนราบหรือก้มหน้า 4 ชั่วโมงหลังฉีดค่ะ\n• ห้ามนวดหรือกดบริเวณที่ฉีด 24 ชั่วโมงค่ะ\n• เห็นผลเต็มที่ภายใน 7-14 วันค่ะ\n• ผลอยู่ได้ประมาณ 4-6 เดือนค่ะ", "42a": "LIFU (Linear Ultrasound Face Lift) ยกกระชับใบหน้าด้วยเครื่อง Ultrasound โดยปล่อยพลังงานคลื่นทั้งแบบเส้นและแบบจุด เป็นนวัตกรรมใหม่จากเกาหลีค่ะ\nช่วยยกกระชับใบหน้า ปรับรูปหน้า ลดความหย่อนคล้อยลึกถึงชั้นกล้ามเนื้อ และลดไขมันใต้ผิวหนังค่ะ", "42b": "ราคา LIFU:\n• 400 shots 8,900 บาท\n• 600 shots 12,900 บาท\n• 800 shots 14,900 บาท (แนะนำ ครอบคลุมทั่วใบหน้า รอบดวงตา และเหนียง)\n• 1,000 shots 18,900 บาท\n• 1,200 shots 21,900 บาท\nแปะยาชา 1 ชั่วโมง ทำประมาณ 30 นาทีค่ะ จะรู้สึกอุ่นๆระหว่างทำ หากเจ็บมากสามารถแจ้งคุณหมอเพื่อปรับระดับพลังงานได้ค่ะ", "42c": "การดูแลหลังทำ LIFU:\n• ไม่ต้องพักฟื้น สามารถใช้หน้าได้เลยค่ะ\n• เห็นผลทันทีประมาณ 20% เห็นผลเต็มที่ภายใน 1 เดือนค่ะ\n• ผลอยู่ได้ประมาณ 6 เดือน แนะนำทำซ้ำทุก 6 เดือนค่ะ", "43": "Long Pulsed Tightening ช่วยยกกระชับกรอบหน้าและลดเหนียง ราคา 4,990 บาท (ไม่จำกัด Shot) ค่ะ\nถ้าทำคู่กับฉีด Botox มีส่วนลด 1,000 บาท เหลือ 3,990 บาทค่ะ", "44": "Rejuran (รีจูรัน) คือหัตถการฟื้นฟูผิวด้วยสาร Polynucleotide (PN) สกัดจาก DNA ปลาแซลมอน กระตุ้นคอลลาเจน ซ่อมแซมเซลล์ผิวจากภายในสู่ภายนอกค่ะ\nผลลัพธ์คือผิวอิ่มฟู ฉ่ำวาว (Glass Skin) รูขุมขนกระชับ ลดริ้วรอยเล็กๆ และหลุมสิวตื้นขึ้นค่ะ\nเห็นผลชัดเจนเมื่อฉีดต่อเนื่องค่ะ ยังไงเข้ามาปรึกษาคุณหมอก่อนได้เลยค่ะ", "45": "มียาทาและโบท็อกลดเหงื่อค่ะ สามารถเข้ามาปรึกษาคุณหมอก่อนได้ค่ะ", "yag_before": "การเตรียมตัวก่อนทำ SMOOTH YAG:\n• งดการถอนขน แว็กซ์ขน 2 สัปดาห์ก่อนทำค่ะ\n• สามารถโกนขนมาเองก่อน 1-2 วัน ให้เหลือส่วนที่สั้นประมาณ 1-2 mm ช่วยให้เลเซอร์ลงถึงรากขนได้ง่ายขึ้นค่ะ หรือหากไม่สะดวกสามารถมาโกนที่คลินิกก่อนทำได้ค่ะ\n• งดสครับ ขัดผิว หรือใช้สารผลัดเซลล์ผิวแรงๆ 1-2 สัปดาห์ก่อนค่ะ", "yag_after": "การดูแลหลังทำ SMOOTH YAG:\n• บริเวณที่ทำเลเซอร์ให้งดอาบแดดหรือ   doCopy('สวัสดีค่ะคุณ '+n+' พอดีคุณ '+n+' มีนัดที่พิมพ์กุลคลินิก วันที่ '+d+' เวลา '+t+' น. ไม่ทราบว่าสะดวกมาตามนัดไหมคะ');
}
function updApt2() {
  var el=document.getElementById('apt2-prev');
  if(!el) return;
  var n=APT2.name||'[ชื่อ]', d=APT2.date||'[วันที่]';
  el.textContent='สวัสดีค่ะ คุณ '+n+' เดิมคุณ '+n+' มีนัดที่พิมพ์กุลคลินิกเมื่อวันที่ '+d+' คุณ '+n+' สะดวกทำนัดใหม่ไหมคะ';
}
function cpApt2() {
  var n=APT2.name||'[ชื่อ]', d=APT2.date||'[วันที่]';
  doCopy('สวัสดีค่ะ คุณ '+n+' เดิมคุณ '+n+' มีนัดที่พิมพ์กุลคลินิกเมื่อวันที่ '+d+' คุณ '+n+' สะดวกทำนัดใหม่ไหมคะ');
}

function buildSum() {
  var rows=DR.filter(function(r){ return r.n.trim(); });
  if(!rows.length) return 'กรุณาใส่ข้อมูลยาค่ะ';
  var fee=(DM==='post')?70:0;
  var dt=rows.reduce(function(s,r){ return s+(parseFloat(r.p)||0); },0);
  var lines=rows.map(function(r,i){
    return (i+1)+'. '+r.n+(r.p?' ราคา '+Number(r.p).toLocaleString()+' บาท':'');
  }).join('\n');
  var dl=(DM==='post')?'ค่าจัดส่งทางไปรษณีย์ 70 บาท (ส่งภายใน 24 ชม.)':'ค่าจัดส่ง Grab/Lineman ตามจริง (ส่งภายในเวลาทำการ)';
  var tl=(DM==='post')?'รวม '+(dt+fee).toLocaleString()+' บาทค่ะ':'รวมยา '+dt.toLocaleString()+' บาท + ค่าส่งตามจริงค่ะ';
  return 'แอดมินขออนุญาตสรุปยอดค่ะ\n'+lines+'\n'+dl+'\n'+tl;
}
function cpSum() { doCopy(buildSum()); }
function yagTxt(r) {
  return 'SMOOTH YAG - '+r[0]+'\n1 ครั้ง: '+r[1].toLocaleString()+' บาท\n5 ครั้ง (ใช้ใน 7 เดือน): '+r[2].toLocaleString()+' บาท\n10 ครั้ง (ใช้ใน 14 เดือน): '+r[3].toLocaleString()+' บาท\n\n📌 ซื้อ 3 Area ฟรีเลเซอร์ 1 ครั้ง/Area (รวม 3 ครั้ง) ค่ะ 😊';
}

// fill-in card สำหรับยืนยันนัด
function rAptCard() {
  var name=APT.name||'', date=APT.date||'', time=APT.time||'';
  var prev='สวัสดีค่ะคุณ '+(name||'[ชื่อ]')+' พอดีคุณ '+(name||'[ชื่อ]')+' มีนัดที่พิมพ์กุลคลินิก วันที่ '+(date||'[วันที่]')+' เวลา '+(time||'[เวลา]')+' น. ไม่ทราบว่าสะดวกมาตามนัดไหมคะ';
  return '<div class="card" style="border-color:var(--pkm)">'
    +'<div class="clbl" style="margin-bottom:10px">✏️ ยืนยันนัด — เติมข้อมูลแล้วคัดลอก</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:6px">'
    +'<input style="flex:1;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--bg);color:var(--tx);outline:none" placeholder="ชื่อลูกค้า" value="'+name.replace(/"/g,'&quot;')+'" oninput="APT.name=this.value;updApt()">'
    +'</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:10px">'
    +'<input style="flex:1;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--bg);color:var(--tx);outline:none" placeholder="วันที่ เช่น 15 มิ.ย." value="'+date.replace(/"/g,'&quot;')+'" oninput="APT.date=this.value;updApt()">'
    +'<input style="flex:1;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--bg);color:var(--tx);outline:none" placeholder="เวลา เช่น 16.00" value="'+time.replace(/"/g,'&quot;')+'" oninput="APT.time=this.value;updApt()">'
    +'</div>'
    +'<div class="sprev" id="apt-prev">'+prev.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</div>'
    +'<div style="display:flex;gap:6px">'
    +'<button class="bcp" style="flex:1" onclick="cpApt()">คัดลอก</button>'
    +'<button class="bcp" style="flex:1;background:var(--txm)" onclick="cp(\'5\')">Copy แบบเว้นที่ว่าง</button>'
    +'</div></div>';
}

// fill-in card สำหรับขอทำนัดใหม่
function rApt2Card() {
  var name=APT2.name||'', date=APT2.date||'';
  var prev='สวัสดีค่ะ คุณ '+(name||'[ชื่อ]')+' เดิมคุณ '+(name||'[ชื่อ]')+' มีนัดที่พิมพ์กุลคลินิกเมื่อวันที่ '+(date||'[วันที่]')+' คุณ '+(name||'[ชื่อ]')+' สะดวกทำนัดใหม่ไหมคะ';
  return '<div class="card" style="border-color:var(--pkm)">'
    +'<div class="clbl" style="margin-bottom:10px">✏️ ขอทำนัดใหม่ — เติมข้อมูลแล้วคัดลอก</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:10px">'
    +'<input style="flex:1;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--bg);color:var(--tx);outline:none" placeholder="ชื่อลูกค้า" value="'+name.replace(/"/g,'&quot;')+'" oninput="APT2.name=this.value;updApt2()">'
    +'<input style="flex:1;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--bg);color:var(--tx);outline:none" placeholder="วันที่นัดเดิม" value="'+date.replace(/"/g,'&quot;')+'" oninput="APT2.date=this.value;updApt2()">'
    +'</div>'
    +'<div class="sprev" id="apt2-prev">'+prev.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</div>'
    +'<div style="display:flex;gap:6px">'
    +'<button class="bcp" style="flex:1" onclick="cpApt2()">คัดลอก</button>'
    +'<button class="bcp" style="flex:1;background:var(--txm)" onclick="cp(\'6\')">Copy แบบเว้นที่ว่าง</button>'

function rSched() {
  var doc=todoc(), dn=DNS[new Date().getDay()];
  var h='<div class="slbl">ตารางแพทย์</div>';
  h+='<div class="tdhi"><div class="tdl">วันนี้ ('+dn+')</div>';
  h+='<div class="tdd">'+(doc||'วันนี้ไม่มีแพทย์ประจำค่ะ')+'</div></div>';
  h+='<div class="scard">';
  h+='<div class="srow"><span class="badge bf">คุณหมอผู้หญิง</span><div>';
  SF_F.d.forEach(function(d){ h+='<span class="pill pf">'+d+'</span> '; });
  h+='</div></div><div class="srow"><span class="badge bm">คุณหมอผู้ชาย</span><div>';
  SF_M.d.forEach(function(d){ h+='<span class="pill pm">'+d+'</span> '; });
  h+='</div></div>';
  h+='<div class="snote">สามารถเข้ามาวันที่สะดวกได้ค่ะ แอดมินฝากเคสกับคุณหมอให้ค่ะ</div></div>';
  h+='<div class="card"><div class="clbl">ข้อความตอบเรื่องวันหมอ</div>';
  h+='<div class="ctxt">'+g('0')+'</div>';
  h+='<div class="ca"><span></span><button class="bcp" onclick="cp(\'0\')">คัดลอก</button></div></div>';
  return h;
}

function rDel() {
  var dr='';
  DR.forEach(function(r,i){
    dr+='<div class="drow">';
    dr+='<input placeholder="ชื่อยา" value="'+r.n.replace(/"/g,'&quot;')+'" oninput="DR['+i+'].n=this.value;updPrev()">';
    dr+='<input class="pi" type="number" placeholder="ราคา" value="'+r.p+'" oninput="DR['+i+'].p=this.value;updPrev()">';
    dr+='<button class="brm" onclick="rmDR('+i+')">×</button></div>';
  });
  var h='<div class="slbl">สั่งยาจัดส่ง</div>';
  h+='<div class="card"><div class="clbl">ข้อความแจ้งตัวเลือกจัดส่ง</div>';
  h+='<div class="ctxt">'+g('1')+'</div>';
  h+='<div class="ca"><span></span><button class="bcp" onclick="cp(\'1\')">คัดลอก</button></div></div>';
  h+='<div class="card"><div class="clbl" style="margin-bottom:12px">สรุปยอดยา + จัดส่ง</div>';
  h+='<div class="dopt'+(DM==='post'?' on':'')+'" onclick="setDM(\'post\')">';
  h+='<input type="radio"'+(DM==='post'?' checked':'')+' readonly>';
  h+='<div class="dlbl"><b>ไปรษณีย์ +70 บาท</b>ส่งภายใน 24 ชม.</div></div>';
  h+='<div class="dopt'+(DM==='grab'?' on':'')+'" onclick="setDM(\'grab\')">';
  h+='<input type="radio"'+(DM==='grab'?' checked':'')+' readonly>';
  h+='<div class="dlbl"><b>Grab / Lineman</b>ค่าส่งตามจริง ส่งในเวลาทำการ</div></div>';
  h+='<div style="margin:12px 0 6px;font-size:13px;font-weight:600;color:#555">รายการยา</div>'+dr;
  h+='<button class="badd" onclick="addDR()">+ เพิ่มรายการยา</button>';
  h+='<div class="sprev" id="dp">'+buildSum()+'</div>';
  h+='<button class="bcp" style="width:100%;padding:10px" onclick="cpSum()">คัดลอกข้อความสรุป</button></div>';
  return h;
}

function rYag() {
  var areas='';
  YAG.forEach(function(r,i){
    areas+='<div style="border:1px solid var(--gnm);border-radius:var(--rs);background:var(--gnl);padding:10px;margin-bottom:8px">';
    areas+='<div style="font-size:13px;font-weight:600;color:var(--gn);margin-bottom:5px">'+r[0]+'</div>';
    areas+='<div style="font-size:12px;color:#555;margin-bottom:7px">1 ครั้ง: <b>'+r[1].toLocaleString()+'</b> | 5 ครั้ง: <b>'+r[2].toLocaleString()+'</b> | 10 ครั้ง: <b>'+r[3].toLocaleString()+'</b></div>';
    areas+='<button class="bcp bgn" style="width:100%;font-size:12px;padding:6px" onclick="doCopy(yagTxt(YAG['+i+']))">คัดลอก</button></div>';
  });
  var h='<div class="slbl">เลเซอร์ขนถาวร (SMOOTH YAG)</div>';
  h+='<div class="card"><div class="gpromo">🎁 ซื้อ 3 Area ฟรีเลเซอร์ 1 ครั้ง/Area (รวม 3 ครั้ง)</div>';
  h+='<div style="margin-top:10px">'+areas+'</div></div>';
  return h;
}

function rPark() {
  var h='<div class="slbl">ที่อยู่และที่จอดรถ</div>';
  h+='<div class="card"><div class="clbl" style="margin-bottom:10px">🚗 ที่จอดรถ</div>';
  h+='<div class="pki"><span>📍</span><span>จอดได้ทางด้านข้างคลินิก และด้านหลังคลินิกบริเวณ <b>ตึกเพรชชมพูแมนชั่น</b> สามารถเอากรวยออกได้เลยค่ะ</span></div>';
  h+='<div class="pki"><span>🏪</span><span>หากที่จอดเต็ม ขับเลยคลินิกตรงไป 1 ซอย จะเจอลานจอดของ 7-Eleven ค่ะ</span></div>';
  h+='<div class="pki"><span>📹</span><span><a href="https://www.facebook.com/share/r/1DDfDvmPqJ/?mibextid=wwXIfr" target="_blank" style="color:var(--pk)">คลิปที่จอดรถ Facebook</a></span></div>';
  h+='<button class="bcp" style="width:100%;margin-top:8px" onclick="cp(\'2\')">คัดลอกข้อความที่จอด + ลิงก์</button></div>';
  h+='<div class="card"><div class="clbl" style="margin-bottom:10px">🚇 ที่อยู่และการเดินทาง</div>';
  h+='<div class="pki"><span>📍</span><span>คลินิกอยู่บริเวณ <b>ตรงข้ามตลาดมีนบุรี</b> ติด MRT ตลาดมีนบุรี ทางออก 3 หรือ 4 ค่ะ</span></div>';
  h+='<div class="pki"><span>📞</span><span>โทร 099-029-5639</span></div>';
  h+='<div class="pki"><span>🗺️</span><span><a href="https://maps.app.goo.gl/bzFThvJoSQFMmx9dA" target="_blank" style="color:var(--pk)">เปิด Google Maps</a></span></div>';
  h+='<button class="bcp" style="width:100%;margin-top:8px" onclick="cp(\'3\')">คัดลอกที่อยู่ + Google Maps</button></div>';
  return h;
}

function render() {
  var q=document.getElementById('q').value.toLowerCase().trim();
  var tabHTML='';
  CATS.forEach(function(c){
    tabHTML+='<button class="tab'+(c===ACT?' on':'')+'" data-c="'+c+'">'+c+'</button>';
  });
  document.getElementById('tabs').innerHTML=tabHTML;

  var h='';
  var sS=(ACT==='ทั้งหมด'||ACT==='ตารางหมอ');
  var sD=(ACT==='ทั้งหมด'||ACT==='สั่งยาจัดส่ง');
  var sY=(ACT==='ทั้งหมด'||ACT==='เลเซอร์ขน YAG');
  var sP=(ACT==='ทั้งหมด'||ACT==='ที่อยู่และที่จอดรถ');
  if(!q) {
    if(sS) h+=rSched();
    if(sD) h+=rDel();
    if(sY) h+=rYag();
    if(sP) h+=rPark();
  }

  var filt=DATA.filter(function(d){
    var mc=(ACT==='ทั้งหมด'||d[0]===ACT);
    var mq=(!q||d[0].indexOf(q)>=0||d[1].toLowerCase().indexOf(q)>=0||g(d[2]).toLowerCase().indexOf(q)>=0);
    return mc&&mq;
  });
  var gr={};
  filt.forEach(function(d){ if(!gr[d[0]]) gr[d[0]]=[]; gr[d[0]].push(d); });

  for(var cat in gr) {
    h+='<div class="slbl">'+cat+'</div>';
    // ถ้าเป็นหมวดนัดหมาย ใส่ fill-in cards ก่อน
    if(cat==='นัดหมาย' && !q) {
      h+=rAptCard();
      h+=rApt2Card();
    }
    gr[cat].forEach(function(d){
      // ข้ามการ์ด ยืนยันนัด และ ขอทำนัดใหม่ เพราะแสดงเป็น fill-in แล้ว
      if(!q && (d[2]==='5'||d[2]==='6')) return;
      var k=d[2];
      var ex=EXP[k];
      var txt=g(k).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      h+='<div class="card">';
      h+='<div class="ch"><div class="clbl">'+d[1]+'</div><span class="ctag">'+d[0]+'</span></div>';
      h+='<div class="ctxt'+(ex?'':' cl')+'">'+txt+'</div>';
      h+='<div class="ca"><button class="bex" onclick="togEx(\''+k+'\')">'+(ex?'ย่อ ▲':'ดูเพิ่ม ▼')+'</button>';
      h+='<button class="bcp" onclick="cp(\''+k+'\')">คัดลอก</button></div></div>';
    });
  }
  if(filt.length===0&&q) h='<div class="empty">ไม่พบข้อความที่ค้นหาค่ะ</div>';
  document.getElementById('main').innerHTML=h;
}

document.getElementById('tabs').addEventListener('click', function(e){
  var b=e.target.closest('[data-c]');
  if(b){ ACT=b.getAttribute('data-c'); render(); }
});

render();
</script>
