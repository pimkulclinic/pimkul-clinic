<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>พิมพ์กุล คลินิก</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pk:#e8829a;--pkl:#fdf0f3;--pkm:#f5c6d2;--pkd:#c25e78;--gn:#2d7a47;--gnl:#e8f7ec;--gnm:#9ed9b0;--bg:#fafafa;--sf:#fff;--tx:#2a2a2a;--txm:#888;--txl:#bbb;--bd:rgba(0,0,0,.08);--r:14px;--rs:8px}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;-webkit-tap-highlight-color:transparent}
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:16px 16px 0;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--pk),var(--pkd));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:20px;height:20px;fill:#fff}
.ht{font-size:17px;font-weight:600}.hs{font-size:12px;color:var(--txm)}
.sw{position:relative;margin-bottom:10px}
.sw svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--txm);fill:none;pointer-events:none}
#q{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--bd);border-radius:10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--tx);outline:none}
#q:focus{border-color:var(--pk)}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 14px;border-radius:20px;font-size:13px;font-family:inherit;white-space:nowrap;border:1px solid var(--bd);background:transparent;color:var(--txm);cursor:pointer}
.tab.on{background:var(--pk);color:#fff;border-color:var(--pk)}
.main{padding:12px 14px 80px}
.slbl{font-size:12px;font-weight:600;color:var(--pk);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:8px}
.ch{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.ctag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;background:var(--pkl);color:var(--pkd)}
.clbl{font-size:14px;font-weight:600;flex:1}
.ctxt{font-size:14px;line-height:1.65;color:#444;margin-bottom:10px;white-space:pre-line}
.ctxt.cl{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ca{display:flex;gap:8px;align-items:center}
.bex{font-size:12px;color:var(--txm);background:none;border:none;padding:0;cursor:pointer;font-family:inherit;flex:1;text-align:left}
.bcp{font-size:13px;font-family:inherit;padding:7px 16px;border-radius:8px;background:var(--pk);color:#fff;border:none;cursor:pointer;font-weight:500;flex-shrink:0}
.bcp:active{transform:scale(.96)}.bgn{background:var(--gn)}
.dopt{display:flex;align-items:flex-start;gap:10px;padding:10px;border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:8px;cursor:pointer}
.dopt.on{border-color:var(--pk);background:var(--pkl)}
.dlbl{font-size:13px;line-height:1.5}.dlbl b{display:block;font-weight:600}
.drow{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.drow input{flex:1;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--bg);color:var(--tx);outline:none}
.drow input:focus{border-color:var(--pk)}.drow .pi{width:90px;flex:none}
.drow input::placeholder{color:var(--txl)}
.brm{background:none;border:none;color:var(--txl);cursor:pointer;font-size:18px;line-height:1;padding:0 4px}
.badd{display:flex;align-items:center;gap:6px;font-size:13px;font-family:inherit;color:var(--pk);background:none;border:1px dashed var(--pkm);border-radius:var(--rs);padding:7px 12px;cursor:pointer;width:100%;margin-bottom:12px}
.sprev{background:var(--bg);border-radius:var(--rs);padding:12px;font-size:13px;line-height:1.7;color:var(--tx);white-space:pre-line;border:1px solid var(--bd);margin-bottom:10px;min-height:50px}
.scard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:8px}
.srow{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;margin-top:2px}
.bf{background:#fde8f0;color:#c25e78}.bm{background:#e8f0fe;color:#3d6ac5}
.snote{font-size:13px;color:#555;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}
.pill{display:inline-block;padding:2px 8px;border-radius:5px;font-size:12px;font-weight:500;margin:2px 3px 2px 0}
.pf{background:#fde8f0;color:#c25e78}.pm{background:#e8f0fe;color:#3d6ac5}
.tdhi{background:linear-gradient(135deg,var(--pkl),#fff);border:1px solid var(--pkm);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.tdl{font-size:11px;font-weight:600;color:var(--pk);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.tdd{font-size:15px;font-weight:600}
.gpromo{background:var(--gnl);border:1px solid var(--gnm);border-radius:var(--rs);padding:8px 12px;font-size:13px;color:var(--gn);font-weight:500;margin:8px 0 4px;text-align:center}
.pki{display:flex;gap:8px;margin-bottom:8px;font-size:13px;line-height:1.6}
.pki span:first-child{flex-shrink:0;font-size:16px;margin-top:1px}
.empty{text-align:center;padding:3rem 1rem;color:var(--txm);font-size:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#2a2a2a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}</style>
</head>
<body>
<div class="hdr">
<div class="hdr-top">
<div class="logo"><svg viewBox="0 0 24 24"><path d="M12 21.7C5.4 21.7 2 16.8 2 12 2 7.2 5.4 2.3 12 2.3s10 4.9 10 9.7-3.4 9.7-10 9.7zm-1-13v3H8l4 4 4-4h-3V8.7h-2z"/></svg></div>
<div><div class="ht">พิมพ์กุล คลินิก</div><div class="hs">คู่มือตอบคนไข้ สำหรับแอดมิน</div></div>
</div>
<div class="sw"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="q" placeholder="ค้นหา เช่น สิว นัด ราคา ยา..." oninput="render()"></div>
<div class="tabs" id="tabs"></div>
</div>
<div class="main" id="main"></div>
<div class="toast" id="toast"></div>
<textarea id="ta" style="position:fixed;left:-9999px;top:0;opacity:0"></textarea>
<script type="application/json" id="d-tx">{"0": "คุณหมอผู้หญิงเข้าวันพุธ พฤหัสบดี เสาร์ คุณหมอผู้ชายเข้าวันจันทร์ อังคาร ศุกร์ และอาทิตย์ค่ะ สามารถเข้ามาวันที่สะดวกได้เลยค่ะ แอดมินฝากเคสกับคุณหมอให้ค่ะ 😊", "1": "คนไข้สะดวกเข้ามารับที่คลินิก หรือจัดส่งทางไปรษณีย์มีค่าบริการ 70 บาท ส่งภายใน 24 ชม. หรือสะดวกเรียก Grab/Lineman ค่าส่งตามจริง ส่งภายในเวลาทำการค่ะ", "2": "ที่จอดรถพิมพ์กุลคลินิก:\n• จอดได้ด้านข้างคลินิก\n• ด้านหลังบริเวณตึกเพรชชมพูแมนชั่น สามารถเอากรวยออกได้เลยค่ะ\n• หากเต็มขับเลยไป 1 ซอยจะเจอลานจอดของ 7-Eleven ค่ะ\nคลิปที่จอดรถ: https://www.facebook.com/share/r/1DDfDvmPqJ/?mibextid=wwXIfr", "3": "พิมพ์กุลคลินิก ตรงข้ามตลาดมีนบุรี ตรงข้ามตลาดจตุจักร 2 ซอยถนนสีหบุรานุกิจ 18 ติด MRT ตลาดมีนบุรี ทางออก 3 หรือ 4 ค่ะ โทร 099-029-5639\nGoogle Maps: https://maps.app.goo.gl/bzFThvJoSQFMmx9dA", "4": "สามารถนัดหมายกับแอดมินหรือเข้ามาเป็นคิว walk in ได้ค่ะ\nหากต้องการนัดหมายแอดมินรบกวนขอทราบ\n• ชื่อ-นามสกุล\n• เบอร์โทรติดต่อ\n• วันและเวลาที่สะดวกค่ะ\nแอดมินตรวจสอบคิวแล้วจะรีบแจ้งกลับค่ะ\n\nเปิดทุกวันค่ะ\nวันธรรมดาคุณหมอเข้า 16.00-21.00 น.\nเสาร์-อาทิตย์ 10.00-19.00 น.ค่ะ\nแต่อาจแตกต่างไปในแต่ละวันบ้าง สะดวกวันไหนแจ้งแอดมินเช็คก่อนได้เลยค่ะ", "5": "สวัสดีค่ะคุณ [ชื่อ] พอดีคุณ [ชื่อ] มีนัดที่พิมพ์กุลคลินิก วันที่ [วันที่] เวลา [เวลา] น. ไม่ทราบว่าสะดวกมาตามนัดไหมคะ", "6": "สวัสดีค่ะ คุณ [ชื่อ] เดิมคุณ [ชื่อ] มีนัดที่พิมพ์กุลคลินิกเมื่อวันที่ [วันที่] คุณ [ชื่อ] สะดวกทำนัดใหม่ไหมคะ", "7": "สวัสดีค่ะ วันนี้คุณ [ชื่อ] สะดวกเข้ามาพบหมอตามนัดไหมคะ หากวันนี้ติดธุระหรือไม่สะดวกเข้ามา สามารถแจ้งเพื่อเปลี่ยนนัดได้เลยค่ะ", "8": "สวัสดีค่ะคุณ [ชื่อ] มีนัดวันที่ [วันที่] [เวลา] น. กับคุณหมอ [กุลทอง/พิมพ์] พอดีคุณหมอติดธุระที่โรงพยาบาลจะเข้าคลินิกประมาณ [เวลา] ค่ะ\nคนไข้สะดวกเลื่อนได้ไหมคะ หรือสะดวกตรวจกับคุณหมออีกท่านก่อนได้ค่ะ แอดมินฝากเคสกับคุณหมอให้ค่ะ", "9": "สวัสดีค่ะ ค่ารักษาโดยทั่วไปจะอยู่ที่ประมาณ 500-2,000 บาทค่ะ ขึ้นอยู่กับคุณหมอจ่ายยาค่ะ ถ้ามีหัตถการหรือเจาะเลือดคุณหมอจะแจ้งค่าใช้จ่ายก่อนค่ะ ยังไงเข้ามาให้คุณหมอตรวจประเมินอาการก่อนได้ค่ะ", "10": "ตรวจรักษาโรคผิวหนังปกติค่าแพทย์ 500 บาทค่ะ แล้วแต่บางเคสคุณหมอก็ไม่ได้คิดค่าบริการค่ะ", "11": "ค่าทำแผลทั่วไปอยู่ที่ 350 บาทค่ะ", "12": "ตัดชิ้นเนื้อเพื่อส่งตรวจโรคเริ่มต้นที่ 2,000-6,500 บาทขึ้นกับชนิดของตัวโรคค่ะ เจาะเลือดจะคิดตามชนิดแลปที่คุณหมอสั่งเริ่มต้นที่ 500 บาทค่ะ", "13": "ยากดภูมิของคลินิกหลายชนิดเลยค่ะ ตั้งแต่หลักพัน-หมื่น ยังไงเข้ามาปรึกษาคุณหมอก่อนได้ค่ะ", "pay": "ที่คลินิกรับชำระบัตรเครดิตที่ยอดชำระ 2,000 บาทขึ้นไปค่ะ น้อยกว่ายอดนี้สามารถโอนผ่าน QR code หรือจ่ายเป็นเงินสดได้เช่นกันค่ะ", "slip": "หากโอนแล้วรบกวนส่งสลิปให้แอดมินด้วยค่ะ และสามารถแจ้งชื่อ ที่อยู่ และเบอร์โทรศัพท์สำหรับจัดส่งให้ได้เลยค่ะ", "intro": "พิมพ์กุลคลินิก รับรักษาผิวหนังทั่วไปทุกชนิด เช่น สิว ผื่นแพ้ ผื่นคัน ลมพิษ เชื้อรา หูด งูสวัด สะเก็ดเงิน ด่างขาว ผมร่วง และโรคผิวหนังอื่นๆ นอกจากนี้ยังดูแลปัญหาฝ้า กระ รอยดำ หลุมสิว แผลเป็น ไฝ และกระเนื้อ รวมถึงมีบริการเลเซอร์ ฉายแสง ผ่าตัดชิ้นเนื้อผิวหนัง และหัตถการทางผิวหนังค่ะ", "allergy": "ส่งตรวจเพื่อทดสอบผื่นแพ้มีหลายชนิดค่ะขึ้นกับคุณหมอวินิจฉัย ราคาประมาณ 1,000-4,000 บาทค่ะ แนะนำให้เข้ามาพบคุณหมอเพื่อตรวจประเมินก่อนได้ค่ะ", "general": "คุณหมอสามารถดูแลอาการ [ระบุอาการ] ให้ได้ค่ะ สามารถเข้ามาให้คุณหมอตรวจประเมินอาการก่อนได้ค่ะ 😊", "acne_test": "สวัสดีค่ะ สามารถตรวจเชื้อสิวได้ค่ะ เป็นการตรวจดูว่ามีเชื้อแบคทีเรีย เชื้อราหรือเชื้อไร้ขนบริเวณต่อมไขมันที่อักเสบหรือไม่ค่ะ โดยแนะนำให้พบคุณหมอก่อนว่าจำเป็นต้องมีการตรวจไหมค่ะ", "milia": "สวัสดีค่ะ สิวข้าวสารโดยทั่วไปคุณหมอจะแนะนำทำเลเซอร์ค่ะ หลังทำงดโดนน้ำ 1 วัน จะเป็นสะเก็ดแผลประมาณ 1 สัปดาห์ ค่าใช้จ่ายเริ่มที่ประมาณ 500 บาท/จุด ขึ้นกับขนาดของก้อนค่ะ ทั่วบริเวณมักอยู่ที่ 2,000-4,000 บาทค่ะ", "14": "สวัสดีค่ะ บริการรักษาสิวมีกดสิว 350 ฉีดสิว 300 ทั่วหน้าค่ะ ค่ายาตลับละประมาณ 100 บาทค่ะ ยากินจะขึ้นกับคุณหมอเป็นคนประเมินค่ะ รวมประมาณครั้งละ 500-2,000 บาทค่ะ", "15": "สวัสดีค่ะ\nกดสิวทั่วหน้า 350 บาทค่ะ\nฉีดสิวทั่วหน้า 300 บาทค่ะ\nกดสิว + ฉีดสิว 650 บาทค่ะ", "16": "สวัสดีค่ะ ที่คลินิกมีกดสิว ฉีดสิว mask และฉายแสงฆ่าเชื้อสิวทั้งหมดอยู่ที่ 999 บาทค่ะ\n• กดสิวโดยผู้ช่วยแพทย์\n• ฉีดสิวอักเสบโดยแพทย์\n• มาส์กสูตรลดสิวและปลอบประโลมผิว\n• ฉายแสงฆ่าเชื้อสิว ลดการเกิดสิวเพิ่ม\nสามารถเข้ามาปรึกษาคุณหมอก่อนได้นะคะ", "17": "สิวที่หลังที่คลินิกจะมีหัตถการเป็นฉีดสิวอักเสบ ทำเลเซอร์ และทากรดผลไม้เพื่อลบรอยสิวร่วมกับยาทาค่ะ", "18": "ทางคลินิกมีเลเซอร์รอยดำและรอยแดงจากสิว 3 แบบค่ะ\n• IPL Laser 1,500 บาท\n• Pico Acne 1,990 บาท\n• Long Pulsed Laser 2,590 บาท\nยังไงเข้ามาให้คุณหมอช่วยเลือกเครื่องที่เหมาะกับผิวก่อนได้เลยค่ะ", "19": "รักษาหลุมสิวที่คลินิกจะมีการรักษาด้วยแต้มกรดผลไม้ ราคาแต้มกรดอยู่ที่ 890 บาทค่ะ และเลเซอร์ด้วยเครื่อง Fractional CO2, Pico Scar, Venus Viva ราคาเริ่มต้นที่ 1,500-5,000 บาท/ครั้ง ขึ้นอยู่กับคุณหมอเลือกเครื่องที่เหมาะกับชนิดของหลุมสิวค่ะ\nเห็นผลตั้งแต่ครั้งแรกค่ะ จะชัดขึ้นในครั้งที่ 3-4 ค่ะ", "20": "รอยสิวจะมีเป็นโปรแกรมเลเซอร์ค่ะ ครั้งละประมาณ 1,500-2,000 บาทค่ะ ยังไงเข้ามาให้คุณหมอช่วยดูก่อนได้เลยค่ะ", "21": "สวัสดีค่ะรักษาหูดที่คลินิกมีทั้งยาทา ยาฉีด พ่นเย็นค่ะ และผ่าตัด ค่ารักษาครั้งละ 500-2,000 บาทขึ้นกับคุณหมอประเมินอาการค่ะ", "22": "ที่คลินิกมีการรักษาผมร่วง ผมบางด้วยยาทาน ยาทา และการฉีดยาค่ะ ราคารักษาอยู่ที่ 500-2,000 บาทค่ะ หากมีการเจาะเลือดเพื่อตรวจหาสาเหตุคุณหมอจะแจ้งให้ทราบก่อนทุกครั้งค่ะ", "23": "มียาทา ยาทาน หัตถการมีการฉีดสลายฝ้า 800 บาท เลเซอร์ลดเม็ดสี 1,500-3,000 บาท และลอกกรดผลไม้ค่ะ ยังไงเข้ามาให้คุณหมอประเมินอาการฝ้าดูก่อนได้ค่ะ ราคารักษาฝ้าเริ่มต้นที่ 500-2,000 บาทค่ะ", "24": "สวัสดีค่ะ มีการรักษาด้วยยาทา ยากิน ฉายแสง แล้วก็ยาฉีดค่ะ ยังไงคนไข้เข้ามาให้คุณหมอประเมินอาการก่อนได้ค่ะ ค่ารักษาจะอยู่ที่ประมาณ 500-2,000 บาทค่ะ", "25": "รักษาด่างขาวทางคลินิกจะมีการรักษาโดยยาทา ยาทาน และฉายแสงค่ะ ค่ารักษาโดยทั่วไปจะอยู่ที่ประมาณ 500-2,000 บาทค่ะ", "26": "มีบริการฉีดแผลเป็นนูนและเลเซอร์ค่ะ ฉีดครั้งละประมาณ 500-1,500 บาทค่ะ โดยปกติคุณหมอแนะนำให้ฉีดเดือนละครั้งค่ะ เห็นแผลตั้งแต่ครั้งแรกที่ฉีด แผลเป็นจะนิ่มลงและอาการคันลดลงค่ะ\nเลเซอร์เริ่มต้นที่ 1,500-3,000 ขึ้นอยู่กับคุณหมอเลือกเครื่องค่ะ", "27a": "CO2 Laser จี้ไฝ กระ ติ่งเนื้อ กระเนื้อ ขี้แมลงวัน ต่อมไขมัน หูดค่ะ\nราคาเริ่มต้นจุดละ 500-1,000 บาท ไม่มีราคาเหมา โดยทั่วไปหากปริมาณมากทั่วหน้า/ทั่วคออยู่ที่ 2,000-6,000 บาทค่ะ\nแปะยาชาประมาณ 1 ชั่วโมง ทำประมาณ 20-30 นาที แนะนำให้มาเผื่อเวลาประมาณ 2 ชม.ค่ะ", "27b": "การดูแลหลังทำ CO2 Laser:\n• งดโดนน้ำบริเวณที่เลเซอร์ 24 ชั่วโมงค่ะ\n• สะเก็ดจะหลุดประมาณ 1-2 สัปดาห์ค่ะ\n• หลังครบ 24 ชม. ทาครีมบำรุงและครีมกันแดดได้ปกติค่ะ\n• งดครีมสารผลัดเซลล์ผิวและสครับหน้าประมาณ 2 สัปดาห์ค่ะ\n• สามารถทำซ้ำทุก 4 สัปดาห์ค่ะ", "28a": "Fractional CO2 รักษารอยแผลเป็น หลุมสิว ผิวไม่สม่ำเสมอค่ะ เป็นเครื่องจากเกาหลีค่ะ\nราคาเริ่มต้นที่ 1,500-4,000 บาทค่ะ\nแปะยาชาประมาณ 1 ชั่วโมง ทำประมาณ 20-30 นาทีค่ะ", "28b": "การดูแลหลังทำ Fractional CO2:\n• งดโดนน้ำบริเวณที่เลเซอร์ 24 ชั่วโมงค่ะ\n• สะเก็ดจะหลุดประมาณ 1-2 สัปดาห์ค่ะ\n• หลังครบ 24 ชม. ทาครีมบำรุงและครีมกันแดดได้ปกติค่ะ\n• งดครีมสารผลัดเซลล์ผิวและสครับหน้าประมาณ 2 สัปดาห์ค่ะ\n• สามารถทำซ้ำทุก 4 สัปดาห์ค่ะ", "29a": "Excimer Laser แสงอาทิตย์เทียม สำหรับรักษาด่างขาวค่ะ\nราคาเริ่มต้นที่ครั้งละประมาณ 400 บาทค่ะ\nแนะนำให้ทำ 2-3 ครั้ง/สัปดาห์ต่อเนื่องนาน 2-6 เดือนค่ะ", "29b": "การดูแลหลังทำ Excimer Laser:\n• หลังทำสีผิวบริเวณที่เลเซอร์อาจมีสีแดงอมชมพูขึ้นหรือคล้ำขึ้นได้ในช่วงที่ทำการรักษาค่ะ\n• ห้ามแกะเกาและขีดข่วนบริเวณที่ฉายแสงค่ะ\n• ใช้สบู่เหลวแบบอ่อนโยนเท่านั้น งดสบู่ที่มีสารผลัดเซลล์ผิวค่ะ\n• เลี่ยงการโดนแดดจัดในบริเวณที่ทำ ทาครีมกันแดดอย่างสม่ำเสมอค่ะ\n• ทาครีมบำรุงมอยส์เจอร์ไรเซอร์เช้า-เย็น เพื่อลดอาการคันและแห้งค่ะ\n• ไปตามนัดตามตารางการฉายแสงอย่างสม่ำเสมอค่ะ", "30": "IPL Laser ช่วยรักษารอยแดง รอยดำ และสิวอักเสบค่ะ ราคา 1,500 บาทต่อครั้งค่ะ\nมีโปรโมชั่น 5 ครั้งแถม 2 ครั้ง 7,500 บาทค่ะ\nหลังทำไม่ต้องพักฟื้น สามารถทำซ้ำทุก 2 สัปดาห์ค่ะ", "31a": "Pico Acne รักษารอยสิว คุณหมอจะยิง 2 โหมดคือโหมดรอยแดง และโหมดรอยดำสิว ราคา 1,990 บาทค่ะ\nเป็น PICO Majesty ผ่านมาตรฐาน USFDA ค่ะ", "31b": "การดูแลหลังทำ Pico Acne:\n• อาจมีอาการแดงเล็กน้อยประมาณ 1-2 ชั่วโมงค่ะ จากนั้นกลับมาปกติค่ะ\n• ไม่ทิ้งรอยหรือแผลค่ะ\n• ทาครีมและยาได้ตามปกติค่ะ\n• หลีกเลี่ยงเจอแดดจัดประมาณ 2 สัปดาห์ค่ะ\n• สามารถทำซ้ำทุก 2 สัปดาห์ค่ะ", "32a": "Pico Scar รักษารูขุมขนกว้างและหลุมสิว ราคา 2,990 บาทค่ะ\nแปะยาชาก่อนทำ 45 นาทีถึง 1 ชั่วโมงค่ะ", "32b": "การด   var sD=(ACT==='ทั้งหมด'||ACT==='สั่งยาจัดส่ง');

  var sP=(ACT==='ทั้งหมด'||ACT==='ที่อยู่และที่จอดรถ');

  }
  var filt=DATA.filter(function(d){
    var mc=(ACT==='ทั้งหมด'||d[0]===ACT);
    var mq=(!q||d[0].indexOf(q)>=0||d[1].toLowerCase().indexOf(q)>=0||g(d[2]).toLowerCase().indexOf(q)>=0);
    return mc&&mq;
  });
  var gr={};
  filt.forEach(function(d){ if(!gr[d[0]]) gr[d[0]]=[]; gr[d[0]].push(d); });
  for(var cat in gr) {
    h+='<div class="slbl">'+cat+'</div>';
    if(cat==='นัดหมาย'&&!q) { h+=rAptCard(); h+=rApt6Card(); h+=rApt7Card(); h+=rApt8Card(); }
    if(cat==='ทั่วไป'&&!q)  { h+=rGeneralCard(); h+=rBloodCard(); }
    if(cat==='เลเซอร์ขน YAG'&&!q) { h+=rYagNextCard(); }
    gr[cat].forEach(function(d){
      var k=d[2];
      if(!q&&(k==='5'||k==='6'||k==='7'||k==='8'||k==='general'||k==='blood'||k==='yag_next')) return;
      var ex=EXP[k];
      var txt=g(k).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      h+='<div class="card"><div class="ch"><div class="clbl">'+d[1]+'</div><span class="ctag">'+d[0]+'</span></div>';
      h+='<div class="ctxt'+(ex?'':' cl')+'">'+txt+'</div>';
      h+='<div class="ca"><button class="bex" onclick="togEx(\''+k+'\')">'+(ex?'ย่อ ▲':'ดูเพิ่ม ▼')+'</button>';
      h+='<button class="bcp" onclick="cp(\''+k+'\')">คัดลอก</button></div></div>';
    });
  }
  if(filt.length===0&&q) h='<div class="empty">ไม่พบข้อความที่ค้นหาค่ะ</div>';
  document.getElementById('main').innerHTML=h;
}
document.getElementById('tabs').addEventListener('click',function(e){
  var b=e.target.closest('[data-c]');
  if(b){ ACT=b.getAttribute('data-c'); render(); }
});
render();
</script>
</body>
</html>
